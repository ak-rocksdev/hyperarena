name: hyperarena
description: "HyperArena — Sports booking platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management + DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Formatting
  intl: ^0.20.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Push Notifications
  flutter_local_notifications: ^18.0.1

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0

  # Media
  image_picker: ^1.1.2

  # Icons
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4

  # Linting
  flutter_lints: ^6.0.0

  # App Icon
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - google_fonts/
